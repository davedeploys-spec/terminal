<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command Center -- DaveDeploys HQ</title>
<style>
:root {
  --bg: #070709;
  --surface: #0c0c10;
  --border: #1e1e2a;
  --text: #e8eaf0;
  --text-muted: #6b7280;
  --accent: #60a5fa;
  --yellow: #f0c040;
  --font-mono: 'Courier New', Courier, monospace;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg); color: var(--text-muted); font-family: var(--font-mono);
  font-size: 12px; min-height: 100vh; display: flex;
  align-items: center; justify-content: center; padding: 20px;
  -webkit-font-smoothing: antialiased;
}
.container {
  text-align: center; max-width: 400px;
}
.icon {
  font-size: 32px; color: var(--yellow); margin-bottom: 20px;
  letter-spacing: 4px;
}
.title {
  font-size: 14px; font-weight: 700; letter-spacing: 3px;
  color: var(--text); text-transform: uppercase; margin-bottom: 8px;
}
.sub {
  font-size: 10px; color: var(--text-muted); letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 24px;
}
.desc {
  font-size: 10px; color: var(--text-muted); line-height: 2;
  margin-bottom: 28px;
}
.back-link {
  font-size: 10px; color: var(--accent); text-decoration: none;
  letter-spacing: 2px; text-transform: uppercase;
  padding: 8px 20px; border: 1px solid rgba(96,165,250,0.2);
  border-radius: 4px; transition: all 0.2s ease;
}
.back-link:hover {
  border-color: var(--accent); background: rgba(96,165,250,0.08);
}
</style>
</head>
<body>
<div class="container">
  <div class="icon">[>_]</div>
  <div class="title">Command Center</div>
  <div class="sub">Coming Soon</div>
  <div class="desc">
    Centralized ops terminal for agent task dispatch,<br>
    system health monitoring, and workflow orchestration.<br>
    Currently paused -- check back later.
  </div>
  <a class="back-link" href="../">Back to HQ</a>
</div>
</body>
</html>
